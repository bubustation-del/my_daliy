<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康血壓趨勢日記</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        -webkit-tap-highlight-color: transparent;
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">

    <header class="bg-rose-500 text-white text-center py-4 sticky top-0 shadow-md z-10">
        <h1 class="text-xl font-bold tracking-wide"><i class="fa-solid fa-heart-pulse mr-2"></i>健康血壓趨勢日記</h1>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24 space-y-6">
        
        <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-base font-bold text-slate-700 flex items-center">
                    <i class="fa-solid fa-chart-line text-blue-500 mr-2"></i>血壓波動趨勢
                </h2>
                <select id="rangeSelect" onchange="loadRecords()" class="text-xs bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 text-slate-600 font-medium focus:outline-none focus:ring-1 focus:ring-blue-400">
                    <option value="7">最近 7 筆</option>
                    <option value="14">最近 14 筆</option>
                    <option value="30">最近 30 筆</option>
                    <option value="all">顯示全部</option>
                </select>
            </div>
            <div class="w-full relative h-48">
                <canvas id="bpChart"></canvas>
            </div>
        </section>
        
        <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
            <h2 class="text-lg font-bold mb-4 text-slate-700 flex items-center">
                <i class="fa-solid fa-pen-to-square text-rose-500 mr-2"></i>新增量測數據
            </h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1.5">量測時段</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" id="btnAM" onclick="setPeriod('AM')" class="py-2.5 rounded-xl border-2 border-amber-400 bg-amber-50 text-amber-700 font-bold text-sm transition-all shadow-sm">
                            <i class="fa-solid fa-sun mr-1.5"></i>早上 (起床後)
                        </button>
                        <button type="button" id="btnPM" onclick="setPeriod('PM')" class="py-2.5 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold text-sm transition-all">
                            <i class="fa-solid fa-moon mr-1.5"></i>晚上 (睡前)
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">收縮壓(高壓) <span class="text-slate-400">mmHg</span></label>
                        <input type="number" id="sys" placeholder="120" inputmode="numeric" class="w-full text-base px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">舒張壓(低壓) <span class="text-slate-400">mmHg</span></label>
                        <input type="number" id="dia" placeholder="80" inputmode="numeric" class="w-full text-base px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">心跳 <span class="text-slate-400">次/分</span></label>
                    <input type="number" id="pulse" placeholder="72" inputmode="numeric" class="w-full text-base px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white">
                </div>

                <button onclick="saveRecord()" class="w-full bg-rose-500 hover:bg-rose-600 active:scale-[0.98] text-white font-bold text-base py-3 rounded-xl shadow-md transition-all mt-2">
                    <i class="fa-solid fa-check mr-1.5"></i>儲存紀錄
                </button>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-3 px-1">
                <h2 class="text-base font-bold text-slate-700 flex items-center">
                    <i class="fa-solid fa-history text-slate-500 mr-2"></i>歷史明細
                </h2>
                <button onclick="clearAllRecords()" class="text-xs text-slate-400 hover:text-rose-500 transition-colors">
                    <i class="fa-solid fa-trash-can mr-1"></i>清空全部
                </button>
            </div>
            
            <div id="recordList" class="space-y-2.5"></div>
        </section>
    </main>

    <script>
        let currentPeriod = 'AM';
        let chartInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadRecords();
        });

        function setPeriod(period) {
            currentPeriod = period;
            const btnAM = document.getElementById('btnAM');
            const btnPM = document.getElementById('btnPM');
            
            if(period === 'AM') {
                btnAM.className = "py-2.5 rounded-xl border-2 border-amber-400 bg-amber-50 text-amber-700 font-bold text-sm transition-all shadow-sm";
                btnPM.className = "py-2.5 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold text-sm transition-all";
            } else {
                btnAM.className = "py-2.5 rounded-xl border-2 border-slate-200 bg-slate-50 text-slate-500 font-bold text-sm transition-all";
                btnPM.className = "py-2.5 rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-700 font-bold text-sm transition-all shadow-sm";
            }
        }

        function saveRecord() {
            const sys = parseInt(document.getElementById('sys').value);
            const dia = parseInt(document.getElementById('dia').value);
            const pulse = parseInt(document.getElementById('pulse').value);

            if (!sys || !dia || !pulse) {
                alert('請完整填寫數據哦！');
                return;
            }

            const now = new Date();
            const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            let status = { text: '正常', color: 'bg-emerald-500' };
            if (sys >= 140 || dia >= 90) {
                status = { text: '高血壓', color: 'bg-rose-500' };
            } else if ((sys >= 120 && sys < 140) || (dia >= 80 && dia < 90)) {
                status = { text: '偏高', color: 'bg-amber-500' };
            }

            const record = { sys, dia, pulse, date: dateStr, time: timeStr, period: currentPeriod, status };

            let records = JSON.parse(localStorage.getItem('bpRecordsV2')) || [];
            records.unshift(record);
            localStorage.setItem('bpRecordsV2', JSON.stringify(records));

            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('pulse').value = '';

            loadRecords();
        }

        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('bpRecordsV2')) || [];
            renderList(records);
            renderChart(records);
        }

        function renderList(records) {
            const container = document.getElementById('recordList');
            if (records.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 bg-white rounded-2xl border border-dashed border-slate-200 text-sm">目前尚無量測數據。</div>`;
                return;
            }

            container.innerHTML = records.map((r, index) => {
                const isAM = r.period === 'AM';
                return `
                <div class="bg-white p-3.5 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div>
                        <div class="flex items-center space-x-2 text-xs text-slate-400 mb-1">
                            <span><i class="fa-regular fa-clock mr-1"></i>${r.date} ${r.time}</span>
                            <span class="${isAM ? 'text-amber-600 bg-amber-50' : 'text-blue-600 bg-blue-50'} px-1.5 py-0.5 rounded font-bold text-[10px]">
                                ${isAM ? '☀️ 早上' : '🌙 晚上'}
                            </span>
                        </div>
                        <div class="flex items-baseline space-x-2">
                            <span class="text-xl font-bold text-slate-700">${r.sys}/${r.dia}</span>
                            <span class="text-[10px] text-slate-400">mmHg</span>
                            <span class="text-xs text-slate-500 font-medium pl-2"><i class="fa-solid fa-heart text-rose-400 mr-1"></i>${r.pulse}</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="px-2 py-0.5 rounded-full text-[11px] font-bold text-white ${r.status.color}">
                            ${r.status.text}
                        </span>
                        <button onclick="deleteRecord(${index})" class="text-slate-300 hover:text-rose-500 p-1">
                            <i class="fa-solid fa-xmark text-sm"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        // 升級：支援區間選擇的圖表渲染
        function renderChart(records) {
            const ctx = document.getElementById('bpChart').getContext('2d');
            
            // 讀取當前選擇的顯示區間（7, 14, 30 或 all）
            const range = document.getElementById('rangeSelect').value;
            
            // 根據選擇的區間擷取資料量
            let displayRecords = [...records];
            if (range !== 'all') {
                const limit = parseInt(range);
                displayRecords = displayRecords.slice(0, limit);
            }
            
            // 將資料反轉，讓圖表符合時間軸（由舊到新，左到右）
            displayRecords.reverse();

            const labels = displayRecords.map(r => `${r.date} (${r.period === 'AM' ? '早' : '晚'})`);
            const sysData = displayRecords.map(r => r.sys);
            const diaData = displayRecords.map(r => r.dia);

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '收縮壓 (高壓)',
                            data: sysData,
                            borderColor: 'rgb(244, 63, 94)',
                            backgroundColor: 'rgba(244, 63, 94, 0.1)',
                            borderWidth: 2.5,
                            tension: 0.2,
                            pointRadius: displayRecords.length > 20 ? 1 : 3 // 資料多時縮小點點，畫面才不擁擠
                        },
                        {
                            label: '舒張壓 (低壓)',
                            data: diaData,
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2.5,
                            tension: 0.2,
                            pointRadius: displayRecords.length > 20 ? 1 : 3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top', labels: { boxWidth: 10, font: { size: 10 } } }
                    },
                    scales: {
                        y: { min: 40, max: 200, ticks: { font: { size: 9 } }, grid: { color: '#f1f5f9' } },
                        x: { ticks: { font: { size: 9 }, maxRotation: 45, minRotation: 45 }, grid: { display: false } }
                    }
                }
            });
        }

        function deleteRecord(index) {
            let records = JSON.parse(localStorage.getItem('bpRecordsV2')) || [];
            records.splice(index, 1);
            localStorage.setItem('bpRecordsV2', JSON.stringify(records));
            loadRecords();
        }

        function clearAllRecords() {
            if (confirm('確定要清空所有的紀錄嗎？')) {
                localStorage.removeItem('bpRecordsV2');
                loadRecords();
            }
        }
    </script>
</body>
</html>
